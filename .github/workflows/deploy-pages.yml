# Baut den Client und veröffentlicht ihn auf GitHub Pages.
# Voraussetzungen (einmalig im Repo einstellen):
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. Settings → Secrets and variables → Actions → Variables:
#      API_BASE_URL = https://<dein-server>.onrender.com   (URL des gehosteten Servers)
name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Build (Base-Pfad = /<repo>/ für Projekt-Pages)
        run: npm run build -- --base=/${{ github.event.repository.name }}/
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
