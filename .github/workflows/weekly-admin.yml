name: Weekly admin summary

# Schickt dir (REMINDER_ADMIN_EMAIL) einmal pro Woche einen Lernstand-Ueberblick
# ueber Andrijana & Vuk. Laeuft komplett in der Cloud — du musst nicht online sein.
# Nutzt dieselben Secrets wie der taegliche Reminder (REMINDER_SECRET, API_BASE_URL).

on:
  schedule:
    - cron: '0 17 * * 0' # Sonntag 17:00 UTC (~18:00/19:00 in der Schweiz)
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Wake server and trigger admin summary
        env:
          API_BASE: ${{ vars.API_BASE_URL }}
          REMINDER_SECRET: ${{ secrets.REMINDER_SECRET }}
        run: |
          if [ -z "$API_BASE" ]; then echo "API_BASE_URL Variable fehlt."; exit 0; fi
          curl -sS --max-time 120 "$API_BASE/api/health" -o /dev/null || true
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "$API_BASE/api/reminder/run" \
            -H "X-Reminder-Secret: $REMINDER_SECRET" \
            -H 'Content-Type: application/json' \
            --max-time 120 -d '{"mode":"admin"}' || echo 000)
          echo "HTTP $code"
          cat /tmp/resp.json 2>/dev/null || true
          echo
          if grep -q '"status":"Fehler"' /tmp/resp.json 2>/dev/null; then
            echo "::error::Der Wochenueberblick konnte nicht gesendet werden."
            exit 1
          fi
